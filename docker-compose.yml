services:
  milagram:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Production: MUST be a separate physical disk (see docs/DEPLOY.md)
      - /mnt/data/milagram:/data/posts
      # Development (single disk): uncomment below, comment above
      # - ./data:/data/posts
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
